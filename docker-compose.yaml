services:
  app:
    image: node:20-alpine
    container_name: prism-web
    working_dir: /app
    restart: always
    command: sh -c "npx tsx scripts/db-setup.ts && npx drizzle-kit push && npx tsx scripts/seed.ts && npx next start -H 0.0.0.0"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DATABASE_HOST=mysql
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
    volumes:
      - .:/app
    networks:
      - prism-network

  mysql:
    image: mysql:8.0
    container_name: prism-mysql
    command: --innodb-buffer-pool-size=64M --key-buffer-size=16M --max-connections=50 --performance-schema=off
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - MYSQL_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_DATABASE=${DATABASE_NAME}
      - MYSQL_USER=${DATABASE_USER}
      - MYSQL_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - ../mysql-data-prism:/var/lib/mysql
    networks:
      - prism-network
    restart: unless-stopped
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate --url http://app:3000 run --token ${CF_TOKEN}
    networks:
      - prism-network

networks:
  prism-network:
